name: Release

# This workflow is intentionally inlined instead of using
# zotero-plugin-dev/workflows/.github/workflows/release-plugin.yml because that
# reusable workflow checks out submodules recursively through setup-js. The api
# submodule is deployment-only and should not be required for plugin releases.
# When updating this workflow, compare against:
# https://github.com/zotero-plugin-dev/workflows/blob/main/.github/workflows/release-plugin.yml
# https://github.com/zotero-plugin-dev/workflows/blob/main/setup-js/action.yml

on:
  push:
    tags:
      - V**

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create-release:
    name: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
